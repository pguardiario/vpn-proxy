# tinyproxy.conf - HTTP/HTTPS forward proxy running INSIDE the VPN container.
#
# Anything that connects to this proxy egresses through the NordVPN tunnel,
# so its public IP looks like the VPN exit (residential-ish / not your
# datacenter IP). The host only exposes this on 127.0.0.1 (see
# docker-compose.yml), so it is reachable from your local machine only.

# Bind to all interfaces *inside the container*. This is safe because Docker
# only publishes the port to 127.0.0.1 on the host. Connections arrive from
# the Docker bridge gateway (e.g. 172.x.0.1), not literally 127.0.0.1, which
# is why we do not restrict with Allow rules below.
# Port is overwritten at launch by start-proxy.sh from $PROXY_PORT; this is
# just the standalone default.
Listen 0.0.0.0
Port 39888

# Daemonize (default). This lets POST_CONNECT return immediately so the VPN
# connection monitor keeps running instead of being blocked by the proxy.
Daemon Yes

User nobody
Group nogroup

PidFile "/var/run/tinyproxy.pid"
LogLevel Info

# Generous timeout for long-lived streams / slow upstreams.
Timeout 600

# Drop the proxy's own identifying headers so requests look cleaner.
DisableViaHeader Yes

# No Allow lines => allow all clients. The host-side 127.0.0.1 binding is the
# real access control. If you ever publish this beyond localhost, add e.g.:
#   Allow 127.0.0.1
#   Allow 172.16.0.0/12

# No ConnectPort lines => CONNECT (HTTPS tunneling) allowed on all ports.
# To restrict to standard TLS only, uncomment:
#   ConnectPort 443
#   ConnectPort 563
